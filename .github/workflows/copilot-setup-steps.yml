name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_PROJECT_DIR: Bitcoin.API.Test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution dependencies
        run: |
          if [ ! -d "$TEST_PROJECT_DIR" ]; then
            echo "Configured test project directory '$TEST_PROJECT_DIR' does not exist."
            exit 1
          fi
          project_file=$(find "$TEST_PROJECT_DIR" -maxdepth 1 -name '*.csproj' | head -n 1)
          if [ -z "$project_file" ]; then
            echo "No '*.csproj' file found in existing directory '$TEST_PROJECT_DIR'. Add a project file or update TEST_PROJECT_DIR."
            exit 1
          fi
          dotnet restore "$project_file"
