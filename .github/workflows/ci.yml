name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore
        run: dotnet restore BitCoin.API.slnx

      - name: Check formatting
        run: dotnet format BitCoin.API.slnx --verify-no-changes --no-restore

      - name: Check for vulnerable packages
        run: |
          report=$(dotnet list BitCoin.API.slnx package --vulnerable --include-transitive)
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected."
            exit 1
          fi

      - name: Build
        run: dotnet build BitCoin.API.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test BitCoin.API.slnx -c Release --no-build --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./coverage
          retention-days: 14
